apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintech-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fintech
  template:
    metadata:
      labels:
        app: fintech
    spec:
      containers:
      - name: node-api
        image: my-node-wallet:v1
        ports:
        - containerPort: 3000
      - name: go-matcher
        image: my-go-matcher:v1
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: "finpass"
      - name: redis
        image: redis:alpine
---
apiVersion: v1
kind: Service
metadata:
  name: fintech-svc
spec:
  selector:
    app: fintech
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
