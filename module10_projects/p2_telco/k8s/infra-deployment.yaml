apiVersion: apps/v1
kind: Deployment
metadata:
  name: telco-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telco-mongo
  template:
    metadata:
      labels:
        app: telco-mongo
    spec:
      containers:
      - name: mongodb
        image: mongo:6
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: telco-mongo-svc
spec:
  selector:
    app: telco-mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telco-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telco-redis
  template:
    metadata:
      labels:
        app: telco-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: telco-redis-svc
spec:
  selector:
    app: telco-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
