apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-redis
  template:
    metadata:
      labels:
        app: banking-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: banking-redis-svc
spec:
  selector:
    app: banking-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-java-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-java-api
  template:
    metadata:
      labels:
        app: banking-java-api
    spec:
      containers:
      - name: api
        image: my-java-api:v1
        env:
        - name: DB_URL
          value: "jdbc:postgresql://banking-db-svc:5432/postgres"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASS
          value: "bankpass"
        - name: REDIS_HOST
          value: "banking-redis-svc"
---
apiVersion: v1
kind: Service
metadata:
  name: banking-java-api-svc
spec:
  selector:
    app: banking-java-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
