apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask
        # We will build this image locally named 'my-flask-app:v1'
        image: my-flask-app:v1
        imagePullPolicy: IfNotPresent  # Changed from Never to be more compatible
        ports:
        - containerPort: 5000
        env:
        - name: APP_GREETING
          valueFrom:
            configMapKeyRef:
              name: flask-config
              key: APP_GREETING
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer  # Docker Desktop will map this to localhost:80 (or another port)
