apiVersion: batch/v1
kind: CronJob
metadata:
  name: maintenance-cronjob
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: worker
            image: alpine
            command:
            - /bin/sh
            - -c
            - date; echo "Cleaning up logs..."
          restartPolicy: OnFailure
