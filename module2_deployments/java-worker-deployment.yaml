apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-worker
  template:
    metadata:
      labels:
        app: java-worker
    spec:
      containers:
      - name: java-worker
        image: my-java-worker:v1
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          exec:
            command:
            - cat
            - /app/WorkerApp.class # If the file is gone, the container is "unhealthy"
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - ls
            - /app/WorkerApp.class
          initialDelaySeconds: 2
          periodSeconds: 5
